<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Study Buddy</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background-color: #0f0a1f;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .task-item {
            transition: all 0.3s ease;
        }
        
        .task-item:hover {
            transform: translateX(8px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }
        
        .completed {
            text-decoration: line-through;
            opacity: 0.75;
        }
    </style>
</head>

<body class="min-h-screen text-gray-100">

    <div class="max-w-4xl mx-auto px-4 py-8">

        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="title-font text-5xl font-semibold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent mb-3">
                Pocket Study Buddy
            </h1>
            <p class="text-purple-300 text-lg">Your daily study companion</p>
        </div>

        <!-- Add New Task -->
        <div class="bg-[#1a1433] border border-purple-500/30 rounded-3xl shadow-xl p-8 mb-10">
            <h2 class="text-2xl font-semibold text-white mb-6 flex items-center gap-3">
                <span class="text-3xl">📝</span> Add a New Task
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="task-name" placeholder="Task Name (e.g., Complete Physics Notes)" class="bg-[#251d44] border border-purple-500/40 focus:border-violet-500 text-white px-5 py-4 rounded-2xl focus:outline-none placeholder:text-purple-400">

                <input type="text" id="task-subject" placeholder="Subject (e.g., Physics)" class="bg-[#251d44] border border-purple-500/40 focus:border-violet-500 text-white px-5 py-4 rounded-2xl focus:outline-none placeholder:text-purple-400">

                <input type="date" id="task-deadline" class="bg-[#251d44] border border-purple-500/40 focus:border-violet-500 text-white px-5 py-4 rounded-2xl focus:outline-none">

                <button onclick="addTask()" class="bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 text-white font-semibold py-4 px-8 rounded-2xl transition-all duration-300 shadow-lg shadow-purple-500/50">
                    Add Task
                </button>
            </div>
        </div>

        <!-- Task List -->
        <div class="bg-[#1a1433] border border-purple-500/30 rounded-3xl shadow-xl p-8 mb-10">
            <h2 class="text-2xl font-semibold text-white mb-6">📋 Task List</h2>
            <div id="task-list" class="space-y-4">
                <!-- Tasks injected by JS -->
            </div>
        </div>

        <!-- Progress Tracker -->
        <div class="bg-[#1a1433] border border-purple-500/30 rounded-3xl shadow-xl p-8 mb-10">
            <h2 class="text-2xl font-semibold text-white mb-6">📊 Progress Tracker</h2>
            <div class="flex justify-center py-4">
                <canvas id="progressChart" width="320" height="320"></canvas>
            </div>
            <div class="flex justify-center gap-8 mt-6">
                <div class="flex items-center gap-3">
                    <div class="w-5 h-5 bg-violet-500 rounded-lg"></div>
                    <span class="text-purple-200">Completed</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-5 h-5 bg-gray-600 rounded-lg"></div>
                    <span class="text-purple-200">Pending</span>
                </div>
            </div>
        </div>

        <!-- Countdown -->
        <div class="bg-[#1a1433] border border-purple-500/30 rounded-3xl shadow-xl p-8 mb-10">
            <h2 class="text-2xl font-semibold text-white mb-6">⏳ Countdown to Next Deadline</h2>
            <div class="flex flex-col md:flex-row gap-6 items-end">
                <div class="flex-1">
                    <label class="block text-purple-300 text-sm mb-2">Select Target Date</label>
                    <input type="date" id="countdown-date" class="w-full bg-[#251d44] border border-purple-500/40 focus:border-violet-500 text-white px-5 py-4 rounded-2xl">
                </div>
                <button onclick="startCountdown()" class="bg-gradient-to-r from-fuchsia-600 to-violet-600 hover:from-fuchsia-700 hover:to-violet-700 text-white font-semibold py-4 px-10 rounded-2xl transition-all">
                    Start Countdown
                </button>
            </div>
            <p id="countdown-display" class="mt-8 text-3xl font-bold text-center text-purple-200"></p>
        </div>

        <!-- Motivational Quote -->
        <div class="bg-gradient-to-br from-violet-950/80 to-fuchsia-950/80 border border-purple-500/30 rounded-3xl p-10 text-center">
            <h2 class="text-xl font-medium text-purple-300 mb-4">💡 Today's Motivation</h2>
            <p id="quote-display" class="text-lg italic text-purple-100 leading-relaxed"></p>
        </div>
    </div>

    <!-- Footer with GitHub + LinkedIn -->
    <footer class="text-center py-12">
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 text-purple-400 text-sm">
            <p>Create By Wesly Jeyananthan Abisha ❤️</p>

            <div class="flex items-center gap-5">
                <!-- GitHub -->
                <a href="https://github.com/Abisha71" target="_blank" class="hover:text-white transition-colors flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577 0-.285-.01-1.044-.015-2.049-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.652 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.604-.015 2.896-.015 3.286 0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg> GitHub
                </a>

                <!-- LinkedIn -->
                <a href="https://www.linkedin.com/in/abisha-wesly-jeyananthan-2a05a32b8" target="_blank" class="hover:text-white transition-colors flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg> LinkedIn
                </a>
            </div>
        </div>
    </footer>

    <script>
        let tasks = JSON.parse(localStorage.getItem('studyTasks')) || [];

        function addTask() {
            const name = document.getElementById('task-name').value.trim();
            const subject = document.getElementById('task-subject').value.trim();
            const deadline = document.getElementById('task-deadline').value;

            if (!name || !subject || !deadline) {
                alert("Please fill all fields!");
                return;
            }

            tasks.push({
                id: Date.now(),
                name,
                subject,
                deadline,
                completed: false
            });

            localStorage.setItem('studyTasks', JSON.stringify(tasks));

            document.getElementById('task-name').value = '';
            document.getElementById('task-subject').value = '';
            document.getElementById('task-deadline').value = '';

            renderTasks();
            renderProgress();
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = `<p class="text-purple-400 text-center py-12">No tasks yet. Add one to get started! 📚</p>`;
                return;
            }

            tasks.forEach((task, index) => {
                const div = document.createElement('div');
                div.className = `task-item flex items-center justify-between p-5 bg-[#251d44] rounded-2xl border border-purple-500/30 hover:border-violet-500`;

                div.innerHTML = `
                    <div class="flex items-center gap-4 flex-1">
                        <input type="checkbox" 
                               ${task.completed ? 'checked' : ''} 
                               onchange="toggleComplete(${index})"
                               class="w-6 h-6 accent-violet-500">
                        <div class="${task.completed ? 'completed' : ''}">
                            <strong class="text-white text-lg">${task.name}</strong>
                            <span class="text-purple-400 ml-3">(${task.subject})</span>
                            <p class="text-sm text-purple-500 mt-1">Due: ${task.deadline}</p>
                        </div>
                    </div>
                    <button onclick="deleteTask(${index})" 
                            class="text-red-400 hover:text-red-500 px-5 py-2 hover:bg-red-950/50 rounded-xl transition-colors">
                        Delete
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function toggleComplete(index) {
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('studyTasks', JSON.stringify(tasks));
            renderTasks();
            renderProgress();
        }

        function deleteTask(index) {
            if (confirm("Delete this task?")) {
                tasks.splice(index, 1);
                localStorage.setItem('studyTasks', JSON.stringify(tasks));
                renderTasks();
                renderProgress();
            }
        }

        let progressChart;

        function renderProgress() {
            const completed = tasks.filter(t => t.completed).length;
            const pending = tasks.length - completed;

            const ctx = document.getElementById('progressChart').getContext('2d');
            if (progressChart) progressChart.destroy();

            progressChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Pending'],
                    datasets: [{
                        data: [completed, pending],
                        backgroundColor: ['#a855f7', '#4b5563'],
                        borderColor: '#1a1433',
                        borderWidth: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#c4b5fd',
                                boxWidth: 14,
                                padding: 20,
                                font: {
                                    size: 15
                                }
                            }
                        }
                    }
                }
            });
        }

        let countdownInterval;

        function startCountdown() {
            const dateInput = document.getElementById('countdown-date').value;
            if (!dateInput) return alert("Please select a target date");

            clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const target = new Date(dateInput).getTime();
                const diff = target - now;

                const display = document.getElementById('countdown-display');

                if (diff < 0) {
                    display.innerHTML = `<span class="text-red-400">Deadline Passed! ⏰</span>`;
                    clearInterval(countdownInterval);
                } else {
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                    display.innerHTML = `
                        <span class="text-5xl font-bold text-violet-400">${days}</span>d 
                        <span class="text-5xl font-bold text-violet-400">${hours}</span>h 
                        <span class="text-5xl font-bold text-violet-400">${minutes}</span>m 
                        <span class="text-5xl font-bold text-violet-400">${seconds}</span>s
                    `;
                }
            }, 1000);
        }

        const quotes = [
            "Small daily improvements lead to stunning long-term results.",
            "Discipline is choosing between what you want now and what you want most.",
            "Consistency beats perfection every time.",
            "The secret of getting ahead is getting started.",
            "Stay focused. Your time is now."
        ];

        function showQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote-display').innerText = `"${quote}"`;
        }

        // Initialize
        window.onload = () => {
            renderTasks();
            renderProgress();
            showQuote();
        };
    </script>
</body>

</html>
